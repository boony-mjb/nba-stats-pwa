<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#e8b84b" />
  <title>NBA Live — Create Account</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>

  <div class="auth-page">
    <div class="auth-card">
      <div class="wordmark auth-wordmark">NBA<span>Live</span></div>

      {% if error %}
        <div class="auth-error">{{ error }}</div>
      {% endif %}

      <form method="POST" class="auth-form">
        <label class="auth-label" for="username">Username</label>
        <input class="auth-input" type="text" id="username" name="username" required autofocus />

        <label class="auth-label" for="password">Password</label>
        <input class="auth-input" type="password" id="password" name="password" required minlength="6" />

        <label class="auth-label" for="confirm">Confirm Password</label>
        <input class="auth-input" type="password" id="confirm" name="confirm" required minlength="6" />

        <button type="submit" class="auth-button">Create Account</button>
      </form>

      <a href="{{ url_for('continue_as_guest') }}" class="auth-guest-link">Continue as Guest →</a>

      <div class="auth-switch">
        Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
      </div>
    </div>
  </div>

</body>
</html>
