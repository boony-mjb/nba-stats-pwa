<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#e8b84b" />
  <title>NBA Live — Playoffs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>

  {% include 'nav.html' %}

  <div class="section-head">
    <span class="section-label">2024–25 Playoff Picture</span>
    <span class="game-count" id="season-label"></span>
  </div>

  <div class="conferences">

    <div class="conference-block">
      <div class="conf-header">
        <span class="conf-title">Eastern Conference</span>
      </div>
      <div id="east-list"><div class="loading">Loading...</div></div>
    </div>

    <div class="conference-block">
      <div class="conf-header">
        <span class="conf-title">Western Conference</span>
      </div>
      <div id="west-list"><div class="loading">Loading...</div></div>
    </div>

  </div>

  <script>const API_KEY = "{{ api_key }}";</script>
  <script src="{{ url_for('static', filename='js/playoffs.js') }}"></script>
</body>
</html>
