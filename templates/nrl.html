<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#e8b84b" />
  <title>NBA Live — NRL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>

  {% include 'nav.html' %}

  <div class="day-strip" id="nrl-day-strip"></div>
  <div class="section-head">
    <span class="section-label" id="nrl-day-label">Today</span>
    <span class="game-count" id="nrl-game-count"></span>
  </div>
  <div id="nrl-list"><div class="loading">Loading...</div></div>

  <div id="box-score-modal" class="modal-overlay" onclick="if(event.target===this) closeBoxScore()">
    <div class="modal-card">
      <button class="modal-close" onclick="closeBoxScore()">&times;</button>
      <div id="box-score-content"></div>
    </div>
  </div>

  <script>const API_KEY = "{{ api_key }}";</script>
  <script src="{{ url_for('static', filename='js/nrl.js') }}"></script>
</body>
</html>
