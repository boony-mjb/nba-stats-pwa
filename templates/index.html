<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#e8b84b" />
  <title>NBA Live — Scores</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>

  {% include 'nav.html' %}

  <div class="tabs">
  <button class="tab active" onclick="showTab('scores')">Scores</button>
  <button class="tab" onclick="showTab('teams')">Teams</button>
</div>

  <div id="scores" class="tab-panel active">
    <div class="day-strip-row">
      <div class="day-strip" id="day-strip"></div>
      <input type="date" id="date-picker" class="date-picker" onchange="selectDateFromPicker(this.value)" />
    </div>
    <div class="section-head">
      <span class="section-label" id="day-label">Today</span>
      <span class="game-count" id="game-count"></span>
    </div>
    <div id="scores-list"><div class="loading">Loading...</div></div>
  </div>

  <div id="teams" class="tab-panel">
    <div class="section-head">
      <span class="section-label">All Teams</span>
    </div>
    <div id="teams-list"><div class="loading">Loading...</div></div>
  </div>

  <div id="box-score-modal" class="modal-overlay" onclick="if(event.target===this) closeBoxScore()">
    <div class="modal-card">
      <button class="modal-close" onclick="closeBoxScore()">&times;</button>
      <div id="box-score-content"></div>
    </div>
  </div>

  <script>const API_KEY = "{{ api_key }}";</script>
  <script src="{{ url_for('static', filename='js/db.js') }}"></script>
  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
